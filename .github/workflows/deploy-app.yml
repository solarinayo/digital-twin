# Tolu-style: Docker → Artifact Registry → Cloud Run on push to main.
name: Deploy Digital Twin App

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "public/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/deploy-app.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & deploy Cloud Run
    runs-on: ubuntu-latest

    env:
      REGION: us-central1
      SERVICE: digital-twin
      REPO: digital-twin

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # GitHub secrets often include a trailing newline — strip so the image tag is valid.
          PROJECT_ID="$(printf '%s' "$PROJECT_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPO }}/${{ env.SERVICE }}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      # Never pass the API key into Cloud Run as a plaintext env var; sync to Secret Manager then mount.
      - name: Add OpenAI key version to Secret Manager
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROJECT_ID="$(printf '%s' "$PROJECT_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          OPENAI_API_KEY="$(printf '%s' "$OPENAI_API_KEY" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::GitHub secret OPENAI_API_KEY is empty — skipping Secret Manager version add. Ensure secret openai-api-key has at least one version in GCP."
          else
            printf '%s' "$OPENAI_API_KEY" | gcloud secrets versions add openai-api-key \
              --project "${PROJECT_ID}" --data-file=-
          fi

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          PROJECT_ID="$(printf '%s' "$PROJECT_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          gcloud run deploy ${{ env.SERVICE }} \
            --project "${PROJECT_ID}" \
            --region "${{ env.REGION }}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "OPENAI_API_KEY=openai-api-key:latest" \
            --remove-env-vars "OPENAI_API_KEY" \
            --quiet
