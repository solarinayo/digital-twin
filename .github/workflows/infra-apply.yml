# Terraform: plan on PR; apply on manual dispatch (Tolu-style infra workflow).
name: Terraform GCP infra

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-apply.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    name: Terraform (fmt / validate / plan / apply)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Normalize GCP project id for Terraform
        run: |
          PID="$(printf '%s' '${{ secrets.GCP_PROJECT_ID }}' | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          echo "TF_VAR_project_id=${PID}" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Reconcile state (import existing Artifact Registry if present)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          GCP_PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          terraform import -input=false \
            google_artifact_registry_repository.digital_twin \
            "projects/${GCP_PROJECT_ID}/locations/us-central1/repositories/digital-twin" || true

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -input=false
